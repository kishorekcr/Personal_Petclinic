# -------------------------------------------------------
# ALB Ingress — petclinic.kkdev.in
# Pre-req: AWS Load Balancer Controller must be installed
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petclinic-ingress
  namespace: petclinic
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: petclinic-alb

    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'

    # ✅ CHANGE THIS: Get from ACM console → us-east-1 region → kkdev.in cert
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:316777658873:certificate/1555ccb6-9735-4a8a-bf51-ec9276843b36

    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # ✅ Public subnet IDs from your cluster networking tab (image you shared)
    alb.ingress.kubernetes.io/subnets: subnet-0eabbba01f251efb0,subnet-0bcfb5643fab2eaa9,subnet-078fb598fe647ae21

    alb.ingress.kubernetes.io/tags: env=dev,app=petclinic

spec:
  rules:
    # ✅ FIXED: host + http must be under SAME rule item (was split into 2 items before — bug!)
    - host: petclinic.kkdev.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: petclinic-service
                port:
                  number: 80
