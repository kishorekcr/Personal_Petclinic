# -------------------------------------------------------
# PetClinic App Deployment
# -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic
  labels:
    app: petclinic
spec:
  replicas: 2                  # Start with 2, HPA will scale up/down
  selector:
    matchLabels:
      app: petclinic
  strategy:
    type: RollingUpdate        # Zero downtime deployment
    rollingUpdate:
      maxSurge: 1              # 1 extra pod during update
      maxUnavailable: 0        # Never go below desired replicas
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      # ---- Taint & Toleration (concept coverage) ----
      # If your node has taint: app=petclinic:NoSchedule
      # only pods with this toleration will be scheduled there
      tolerations:
        - key: "app"
          operator: "Equal"
          value: "petclinic"
          effect: "NoSchedule"

      # ---- Node Affinity (prefer app nodes) ----
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - app

      containers:
        - name: petclinic
          image: prakish980/petclinic:latest    # Your DockerHub image
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          
          # ConfigMap env vars
          envFrom:
            - configMapRef:
                name: petclinic-config

          # Secret env vars
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: petclinic-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: petclinic-secret
                  key: MYSQL_PASSWORD

          # Resource limits (required for HPA to work!)
          resources:
            requests:
              cpu: "250m"       # HPA watches this
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # Liveness — is the app alive? Restart if fails
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

          # Readiness — is app ready to receive traffic?
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3

      # Init container — wait for MySQL to be ready before app starts
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z mysql-service 3306; do
                echo "Waiting for MySQL...";
                sleep 3;
              done
              echo "MySQL is ready!"
